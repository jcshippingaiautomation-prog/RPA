# Render Blueprint — deploy เว็บ (rpa-web) + worker (rpa-worker) พร้อมกัน
# วิธีใช้: Render Dashboard → New → Blueprint → เลือก repo นี้ → Apply
#   จากนั้นตั้งค่า env (secrets) ในแต่ละ service ตามคู่มือ rpa-web/DEPLOY.md
#
# ⚠ หมายเหตุ:
#   - secrets (SUPABASE_*, GEMINI_*, GMAIL_*) ตั้ง sync:false → ใส่เองในdashboard (ไม่เก็บใน git)
#   - worker บน Render ต้อง plan ที่มี RAM พอ (Playwright/Chromium ~512MB-1GB)
#     ถ้าจะรัน worker บน VM ของตัวเองแทน (ตามที่เลือก) → ลบ service "rpa-worker" บล็อกล่างออก
#     แล้ว setup worker บน VM ตาม DEPLOY.md หัวข้อ "2) RPA Worker — VM"

services:
  # ---------- เว็บ (Express + SSE) ----------
  # runtime: docker → image มี LibreOffice (soffice) แปลง xlsx/docx → PDF ก่อนส่ง Gemini
  #   (ไม่งั้น Gemini ตอบ HTTP 400 "Unsupported MIME type" กับไฟล์ Excel)
  - type: web
    name: rpa-web
    runtime: docker
    plan: free                      # free = sleep หลังไม่มีคน 15 นาที; starter ($7) = always-on
    dockerContext: .                # build จาก repo root (rpa-web พึ่ง rpa-import-node)
    dockerfilePath: ./rpa-web/Dockerfile
    healthCheckPath: /login.html
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production           # เปิด auth guard (บังคับ login)
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_BUCKET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GMAIL_CLIENT_ID
        sync: false
      - key: GMAIL_CLIENT_SECRET
        sync: false
      - key: GMAIL_REFRESH_TOKEN
        sync: false
      - key: GAS_WEBAPP_URL
        sync: false
      - key: GAS_SHARED_TOKEN
        sync: false

  # ---------- worker (Playwright → DCTK) ----------
  # ⛔ worker ไม่ deploy บน Render — รันบน Windows VM (pm2) แทน เพราะ VM ต่อ DCTK ได้
  #    + Render worker ต้อง plan starter ($7) = บังคับใส่บัตร
  #    setup worker บน VM: rpa-worker/install-service-pm2.ps1 (ดู DEPLOY.md)
  #    ถ้าอนาคตอยากย้าย worker มา Render → เพิ่ม block "type: worker" กลับมา (plan: starter)
